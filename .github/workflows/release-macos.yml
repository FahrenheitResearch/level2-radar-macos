name: Release macOS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.2"
        required: true
        type: string

permissions:
  contents: write

env:
  APP_NAME: Level2 Radar
  DMG_NAME: level2-radar-macos.dmg
  TEAM_ID: X65S282G57

jobs:
  build-sign-notarize:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependency
        run: brew install xcodegen

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"

      - name: Build signed package
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}" BUILD_NUMBER="$BUILD_NUMBER" ./package.sh

      - name: Store notarization credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          xcrun notarytool store-credentials "level2-radar-notary" \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: Notarize DMG
        run: |
          set -euo pipefail
          xcrun notarytool submit "$DMG_NAME" \
            --keychain-profile "level2-radar-notary" \
            --wait

      - name: Staple and validate DMG
        run: |
          set -euo pipefail
          xcrun stapler staple "$DMG_NAME"
          xcrun stapler validate "$DMG_NAME"

      - name: Publish GitHub release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          TITLE="Level2 Radar for macOS ${TAG}"
          NOTES=$(cat <<'EOF'
          Mac Catalyst release of the iPhone-first Level II radar app.

          Includes:
          - SwiftUI + Metal Mac build of the iOS radar app
          - lower-latency live-site playback with backfilled live loops
          - direct-present loop playback path to cut host-side copy overhead
          - preview-first archive loading so a usable frame appears sooner
          - live loop scrubber with a LIVE jump button on macOS
          - adjustable loop depth and optional full-resolution interaction rendering

          Release notes:
          - Universal binary: Apple Silicon and Intel
          - Developer ID signed
          - Apple notarized and stapled DMG
          EOF
          )

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "$DMG_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release edit "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --notes "$NOTES"
          else
            gh release create "$TAG" "$DMG_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --notes "$NOTES"
          fi
